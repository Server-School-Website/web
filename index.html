<!DOCTYPE html>
<html lang="de">
<head>
    <meta charset="UTF-8">
    <title>Privates Surfen</title>
    <style>
        /* Modernes, dunkles Blau-Design */
        body {
            font-family: 'Segoe UI', sans-serif;
            background: radial-gradient(circle, #001f3f, #000b1a);
            margin: 0;
            display: flex;
            justify-content: center;
            align-items: center;
            height: 100vh;
            color: #fff;
        }

        .card {
            background: rgba(255, 255, 255, 0.05);
            backdrop-filter: blur(10px);
            padding: 30px;
            border-radius: 20px;
            width: 90%;
            height: 85%;
            box-shadow: 0 8px 32px 0 rgba(0, 120, 212, 0.37);
            border: 1px solid rgba(255, 255, 255, 0.1);
            text-align: center;
            display: flex;
            flex-direction: column;
        }

        input {
            padding: 12px;
            border-radius: 10px;
            border: none;
            width: 60%;
            margin-bottom: 15px;
            background: rgba(255, 255, 255, 0.1);
            color: white;
        }

        button {
            background: #0078d4;
            color: white;
            border: none;
            padding: 12px 25px;
            border-radius: 10px;
            cursor: pointer;
            font-weight: bold;
            transition: 0.3s;
        }

        button:hover { background: #00a1ff; }

        .logout-btn { background: #ff4d4d; margin-bottom: 10px; align-self: flex-start; }
        .logout-btn:hover { background: #ff1a1a; }

        iframe {
            width: 100%;
            flex-grow: 1;
            border: none;
            border-radius: 15px;
            background: white;
        }

        #content { display: none; }
    </style>
</head>
<body>

    <!-- Login Bereich -->
    <div class="card" id="login-box">
        <h2>🔒 Zugriff gesichert</h2>
        <p>Bitte Passwort eingeben, um fortzufahren:</p>
        <input type="password" id="password" placeholder="Passwort...">
        <br>
        <button onclick="checkPassword()">Anmelden</button>
    </div>

    <!-- Inhalt Bereich -->
    <div class="card" id="content">
        <button class="logout-btn" onclick="logout()">Ausloggen</button>
        <iframe src="https://duckduckgo.com" title="Browser"></iframe>
    </div>

    <script>
        function checkPassword() {
            var pass = document.getElementById("password").value;
            // Passwort: "Geheim123" (als Base64 codiert)
            if (btoa(pass) === "R2VoZWltMTIz") {
                document.getElementById("content").style.display = "flex";
                document.getElementById("login-box").style.display = "none";
            } else {
                alert("Falsches Passwort!");
            }
        }

        function logout() {
            // Seite neu laden, um alle Daten im Speicher zu löschen
            window.location.reload(); 
        }
    </script>
</body>
</html>
