<!DOCTYPE html>
<html lang="de">
<head>
    <meta charset="UTF-8">
    <title>Sicherer Bereich</title>
    <style>
        body { font-family: 'Segoe UI', sans-serif; background: radial-gradient(circle, #001f3f, #000b1a); margin: 0; display: flex; justify-content: center; align-items: center; height: 100vh; color: #fff; }
        .card { background: rgba(255, 255, 255, 0.05); backdrop-filter: blur(10px); padding: 30px; border-radius: 20px; border: 1px solid rgba(255, 255, 255, 0.1); box-shadow: 0 8px 32px 0 rgba(0, 120, 212, 0.37); display: flex; flex-direction: column; width: 90%; height: 85%; }
        #login-box { width: 300px; height: auto; align-items: center; justify-content: center; }
        #content { display: none; }
        input { padding: 12px; border-radius: 10px; border: none; width: 80%; background: rgba(255, 255, 255, 0.1); color: white; margin-bottom: 15px; text-align: center; }
        button { background: #0078d4; color: white; border: none; padding: 12px 25px; border-radius: 10px; cursor: pointer; font-weight: bold; }
        .logout-btn { background: #ff4d4d; width: 120px; margin-bottom: 15px; }
        iframe { width: 100%; height: 100%; border: none; border-radius: 15px; background: white; }
    </style>
</head>
<body>

    <div class="card" id="login-box">
        <h2>🔒 Zugriff</h2>
        <input type="password" id="password" placeholder="Passwort...">
        <button onclick="checkPassword()">Anmelden</button>
    </div>

    <div class="card" id="content">
        <button class="logout-btn" onclick="logout()">Ausloggen</button>
        <!-- Die Lite-Version wird von DuckDuckGo nicht blockiert -->
        <iframe src="https://lite.duckduckgo.com" title="Browser"></iframe>
    </div>

    <script>
        function checkPassword() {
            var pass = document.getElementById("password").value;
            if (btoa(pass) === "R2VoZWltMTIz") {
                document.getElementById("content").style.display = "flex";
                document.getElementById("login-box").style.display = "none";
            } else {
                alert("Falsch!");
            }
        }
        function logout() { window.location.reload(); }
    </script>
</body>
</html>
