<!DOCTYPE html>
<html lang="de">
<head>
    <meta charset="UTF-8">
    <title>Sicherer Bereich</title>
    <style>
        body {
            font-family: 'Segoe UI', sans-serif;
            background: radial-gradient(circle, #001f3f, #000b1a);
            margin: 0;
            display: flex;
            justify-content: center;
            align-items: center;
            height: 100vh;
            color: #fff;
        }

        /* Haupt-Container für alles */
        .card {
            background: rgba(255, 255, 255, 0.05);
            backdrop-filter: blur(10px);
            padding: 30px;
            border-radius: 20px;
            border: 1px solid rgba(255, 255, 255, 0.1);
            box-shadow: 0 8px 32px 0 rgba(0, 120, 212, 0.37);
        }

        /* Speziell für die zentrierte Login-Box */
        #login-box {
            display: flex;
            flex-direction: column;
            align-items: center; /* Zentriert alles horizontal */
            justify-content: center; /* Zentriert alles vertikal */
            width: 300px;
            text-align: center;
        }

        /* Der Inhalts-Bereich, wenn eingeloggt */
        #content {
            display: none;
            width: 95%;
            height: 90%;
            flex-direction: column;
        }

        input {
            padding: 12px;
            border-radius: 10px;
            border: none;
            width: 80%;
            background: rgba(255, 255, 255, 0.1);
            color: white;
            margin-bottom: 15px;
            text-align: center;
        }

        button {
            background: #0078d4;
            color: white;
            border: none;
            padding: 12px 25px;
            border-radius: 10px;
            cursor: pointer;
            font-weight: bold;
            transition: 0.3s;
        }

        button:hover { background: #00a1ff; }

        .logout-btn { background: #ff4d4d; width: 120px; margin-bottom: 15px; align-self: flex-start; }

        iframe {
            width: 100%;
            flex-grow: 1;
            border: none;
            border-radius: 15px;
            background: white;
        }
    </style>
</head>
<body>

    <!-- Login-Box in der Mitte -->
    <div class="card" id="login-box">
        <h2>🔒 Zugriff gesichert</h2>
        <p>Bitte Passwort eingeben:</p>
        <input type="password" id="password" placeholder="Passwort...">
        <button onclick="checkPassword()">Anmelden</button>
    </div>

    <!-- Inhalt Bereich -->
    <div class="card" id="content">
        <button class="logout-btn" onclick="logout()">Ausloggen</button>
        <iframe src="https://search.brave.com" title="Browser"></iframe>
    </div>

    <script>
        function checkPassword() {
            var pass = document.getElementById("password").value;
            // Passwort: "Geheim123"
            if (btoa(pass) === "R2VoZWltMTIz") {
                document.getElementById("content").style.display = "flex";
                document.getElementById("login-box").style.display = "none";
            } else {
                alert("Falsches Passwort!");
            }
        }

        function logout() {
            window.location.reload(); 
        }
    </script>
</body>
</html>
